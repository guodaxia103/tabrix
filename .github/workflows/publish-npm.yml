name: Release Tabrix

on:
  push:
    tags:
      - 'v*'
      - 'tabrix-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (example: v2.0.0)'
        required: true
        type: string
      publish_npm:
        description: 'Publish to npm in this manual run (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "${TAG}" ]; then
              echo "Missing required input: tag"
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          EXPECTED="${TAG#tabrix-v}"
          EXPECTED="${EXPECTED#v}"
          ACTUAL="$(node -p "require('./app/native-server/package.json').version")"

          echo "Tag: ${TAG}"
          echo "Expected version: ${EXPECTED}"
          echo "Package version: ${ACTUAL}"

          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "Version mismatch: tag=${EXPECTED}, package=${ACTUAL}"
            exit 1
          fi

          NOTES_CANDIDATE="docs/RELEASE_NOTES_v${ACTUAL}.md"
          if [ -f "${NOTES_CANDIDATE}" ]; then
            NOTES_FILE="${NOTES_CANDIDATE}"
          else
            NOTES_FILE="docs/CHANGELOG.md"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${ACTUAL}" >> "$GITHUB_OUTPUT"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build shared + native package
        run: pnpm --filter tabrix build

      - name: Build extension zip
        run: pnpm --filter chrome-mcp-server zip

      - name: Pack npm tarball
        shell: bash
        run: |
          cd app/native-server
          npm pack

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p artifacts

          EXT_ZIP="$(ls app/chrome-extension/.output/*-chrome.zip | head -n 1)"
          NPM_TGZ="app/native-server/tabrix-${VERSION}.tgz"

          cp "${EXT_ZIP}" "artifacts/tabrix-extension-v${VERSION}.zip"
          cp "${NPM_TGZ}" "artifacts/tabrix-v${VERSION}.tgz"

          echo "extension_asset=artifacts/tabrix-extension-v${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "npm_asset=artifacts/tabrix-v${VERSION}.tgz" >> "$GITHUB_OUTPUT"

      - name: Check npm publication status
        id: npm_status
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view "tabrix@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true')
        working-directory: app/native-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Skip npm publish in manual mode
        if: steps.npm_status.outputs.already_published == 'false' && github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm != 'true'
        run: echo "Manual run without npm publish. Set publish_npm=true to publish this version to npm."

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Tabrix ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.meta.outputs.notes_file }}
          files: |
            ${{ steps.assets.outputs.extension_asset }}
            ${{ steps.assets.outputs.npm_asset }}
          fail_on_unmatched_files: true
