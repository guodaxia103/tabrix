name: Publish Tabrix To npm

on:
  push:
    tags:
      - 'v*'
      - 'tabrix-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + native package
        run: pnpm --filter tabrix build

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="${TAG#tabrix-v}"
          EXPECTED="${EXPECTED#v}"
          ACTUAL="$(node -p "require('./app/native-server/package.json').version")"
          echo "Tag: ${TAG}"
          echo "Expected version: ${EXPECTED}"
          echo "Package version: ${ACTUAL}"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Version mismatch: tag=${EXPECTED}, package=${ACTUAL}"
            exit 1
          fi

      - name: Publish to npm
        working-directory: app/native-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
