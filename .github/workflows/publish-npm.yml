name: Release Tabrix

on:
  push:
    tags:
      - 'v*'
      - 'tabrix-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (example: v2.0.0)'
        required: true
        type: string
      publish_npm:
        description: 'Publish to npm in this manual run (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: pnpm run release:check

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare extension generated types
        run: pnpm --filter @tabrix/extension exec wxt prepare

      - name: Build shared package
        run: pnpm --filter @tabrix/shared build

      - name: i18n check
        run: pnpm run i18n:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Core tests
        run: pnpm run test:core

      - name: Production audit (high)
        run: pnpm run audit

      - name: Build shared + native package
        run: pnpm --filter @tabrix/tabrix build

      - name: Clean previous extension zip artifacts
        shell: bash
        run: rm -f app/chrome-extension/.output/*-chrome.zip

      - name: Build extension zip
        run: pnpm --filter @tabrix/extension zip

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          PACKAGE_TGZ="$(cd app/native-server && npm pack --silent | tail -n 1)"
          echo "npm_tgz_path=app/native-server/${PACKAGE_TGZ}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p artifacts

          mapfile -t EXT_ZIPS < <(find app/chrome-extension/.output -maxdepth 1 -type f -name '*-chrome.zip' | sort)
          if [ "${#EXT_ZIPS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one extension zip after build, found ${#EXT_ZIPS[@]}."
            printf '%s\n' "${EXT_ZIPS[@]}"
            exit 1
          fi
          EXT_ZIP="${EXT_ZIPS[0]}"
          NPM_TGZ="${{ steps.pack.outputs.npm_tgz_path }}"

          cp "${EXT_ZIP}" "artifacts/tabrix-extension-v${VERSION}.zip"
          cp "${NPM_TGZ}" "artifacts/tabrix-v${VERSION}.tgz"

          echo "extension_asset=artifacts/tabrix-extension-v${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "npm_asset=artifacts/tabrix-v${VERSION}.tgz" >> "$GITHUB_OUTPUT"

      - name: Check npm publication status
        id: npm_status
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PACKAGE_NAME="${{ steps.meta.outputs.package_name }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check shared package publication status
        id: shared_status
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true')
        shell: bash
        run: |
          SHARED_NAME="${{ steps.meta.outputs.shared_package_name }}"
          SHARED_VERSION="${{ steps.meta.outputs.shared_version }}"
          if npm view "${SHARED_NAME}@${SHARED_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish shared package to npm
        id: shared_publish
        continue-on-error: true
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && steps.shared_status.outputs.already_published == 'false'
        working-directory: packages/shared
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e

          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            npm whoami >/dev/null 2>&1
            AUTH_CODE=$?
            if [ "${AUTH_CODE}" -ne 0 ]; then
              echo "publish_code=${AUTH_CODE}" >> "$GITHUB_OUTPUT"
              echo "::error::npm auth failed before shared package publish."
              exit "${AUTH_CODE}"
            fi
          fi

          npm publish --access public --provenance
          PUBLISH_CODE=$?
          if [ "${PUBLISH_CODE}" -ne 0 ] && [ -n "${NODE_AUTH_TOKEN}" ]; then
            npm publish --access public
            PUBLISH_CODE=$?
          fi

          echo "publish_code=${PUBLISH_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${PUBLISH_CODE}" -ne 0 ]; then
            echo "::error::Failed to publish shared package."
            exit "${PUBLISH_CODE}"
          fi

      - name: Verify shared package availability
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && steps.shared_status.outputs.already_published == 'false' && steps.shared_publish.outputs.publish_code == '0'
        shell: bash
        run: |
          SHARED_NAME="${{ steps.meta.outputs.shared_package_name }}"
          SHARED_VERSION="${{ steps.meta.outputs.shared_version }}"

          for i in {1..12}; do
            if npm view "${SHARED_NAME}@${SHARED_VERSION}" version >/dev/null 2>&1; then
              echo "Shared package is visible."
              exit 0
            fi
            echo "Attempt ${i}/12: shared package not visible yet, waiting 10s..."
            sleep 10
          done

          echo "::error::Shared package ${SHARED_NAME}@${SHARED_VERSION} is not visible after publish."
          exit 1

      - name: Publish to npm
        id: npm_publish
        continue-on-error: true
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && (steps.shared_status.outputs.already_published == 'true' || steps.shared_publish.outputs.publish_code == '0')
        working-directory: app/native-server
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e

          npm config get registry
          npm ping
          PING_CODE=$?
          if [ "${PING_CODE}" -ne 0 ]; then
            echo "::warning::npm ping failed before publish (code=${PING_CODE})."
          fi

          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Publish mode: token (NPM_TOKEN)"
            echo "publish_mode=token" >> "$GITHUB_OUTPUT"

            echo "Checking npm auth identity..."
            npm whoami
            AUTH_CODE=$?
            if [ "${AUTH_CODE}" -ne 0 ]; then
              echo "publish_code=${AUTH_CODE}" >> "$GITHUB_OUTPUT"
              echo "::error::npm authentication failed. Please verify NPM_TOKEN."
              exit "${AUTH_CODE}"
            fi
          else
            echo "Publish mode: trusted publishing (OIDC, no NPM_TOKEN)"
            echo "publish_mode=trusted" >> "$GITHUB_OUTPUT"
          fi

          echo "Publishing with provenance..."
          npm publish --access public --provenance
          PUBLISH_CODE=$?

          if [ "${PUBLISH_CODE}" -ne 0 ] && [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Provenance publish failed with code ${PUBLISH_CODE}. Retrying without provenance..."
            npm publish --access public
            PUBLISH_CODE=$?
          fi

          echo "publish_code=${PUBLISH_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${PUBLISH_CODE}" -ne 0 ]; then
            if [ -z "${NODE_AUTH_TOKEN}" ]; then
              echo "::error::npm publish failed in trusted publishing mode. Configure npm trusted publishing for this package or provide NPM_TOKEN."
            else
              echo "::error::npm publish failed with code ${PUBLISH_CODE}."
            fi
            exit "${PUBLISH_CODE}"
          fi

      - name: Print npm debug logs on publish failure
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && steps.npm_publish.outputs.publish_code != '0'
        shell: bash
        run: |
          if [ -d "$HOME/.npm/_logs" ]; then
            echo "npm debug logs:"
            ls -la "$HOME/.npm/_logs" || true
            LATEST_LOG="$(ls -1t "$HOME/.npm/_logs"/*-debug-*.log 2>/dev/null | head -n 1 || true)"
            if [ -n "$LATEST_LOG" ]; then
              echo "---- tail: $LATEST_LOG ----"
              tail -n 200 "$LATEST_LOG" || true
            fi
          else
            echo "No npm debug log directory found."
          fi

      - name: Mark workflow failed when shared package publish expected but failed
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && steps.shared_status.outputs.already_published == 'false' && steps.shared_publish.outputs.publish_code != '0'
        run: |
          echo "::error::Shared package publish failed. Verify npm ownership and token/trusted publishing setup for ${{ steps.meta.outputs.shared_package_name }}."
          exit 1

      - name: Skip npm publish in manual mode
        if: steps.npm_status.outputs.already_published == 'false' && github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm != 'true'
        run: echo "Manual run without npm publish. Set publish_npm=true to publish this version to npm."

      - name: Verify npm package availability
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && steps.npm_publish.outputs.publish_code == '0'
        shell: bash
        run: |
          PACKAGE_NAME="${{ steps.meta.outputs.package_name }}"
          VERSION="${{ steps.meta.outputs.version }}"

          echo "Verifying npm visibility for ${PACKAGE_NAME}@${VERSION}..."
          for i in {1..12}; do
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "npm package is visible."
              exit 0
            fi
            echo "Attempt ${i}/12: not visible yet, waiting 10s..."
            sleep 10
          done

          echo "::error::Package ${PACKAGE_NAME}@${VERSION} is not visible on npm registry after publish."
          exit 1

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Tabrix ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.meta.outputs.notes_file }}
          files: |
            ${{ steps.assets.outputs.extension_asset }}
            ${{ steps.assets.outputs.npm_asset }}
          fail_on_unmatched_files: true

      - name: Mark workflow failed when npm publish expected but failed
        if: steps.npm_status.outputs.already_published == 'false' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true') && steps.npm_publish.outputs.publish_code != '0'
        run: |
          echo "::error::npm publish failed. Verify npm package ownership plus either NPM_TOKEN permissions or Trusted Publishing setup."
          exit 1

