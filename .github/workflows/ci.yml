name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare extension generated types
        run: pnpm --filter @tabrix/extension exec wxt prepare

      - name: Release metadata sanity
        run: pnpm run release:check:ci

      - name: i18n check
        run: pnpm run i18n:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Core tests
        run: pnpm run test:core

      - name: Production audit (high)
        run: pnpm run audit
