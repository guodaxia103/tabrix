name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # NOTE: do not add --ignore-scripts. pnpm 10 already blocks all
        # lifecycle scripts by default and allow-lists exactly the packages
        # declared in package.json `pnpm.onlyBuiltDependencies` (currently
        # only `better-sqlite3`). Passing --ignore-scripts additionally
        # overrides that allowlist and prevents better-sqlite3's
        # prebuild-install from landing the native .node binary.
        run: pnpm install --frozen-lockfile

      - name: Ensure better-sqlite3 native binding is built
        # Belt-and-suspenders: if a cached workspace skipped scripts, force
        # the postinstall for our single allow-listed native dep.
        run: pnpm rebuild better-sqlite3

      - name: Verify better-sqlite3 binding
        run: node -e "require('better-sqlite3'); console.log('better-sqlite3 binding ok')"
        working-directory: app/native-server

      - name: Prepare extension generated types
        run: pnpm --filter @tabrix/extension exec wxt prepare

      - name: Build shared package
        run: pnpm --filter @tabrix/shared build

      - name: Release metadata sanity
        run: pnpm run release:check:ci

      - name: i18n check
        run: pnpm run i18n:check

      - name: Docs check
        run: pnpm run docs:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Core tests
        run: pnpm run test:core

      - name: Build extension (for bundle-size check)
        run: pnpm --filter @tabrix/extension build

      - name: Sidepanel bundle-size gate
        run: pnpm run size:check

      - name: Production audit (high)
        run: pnpm run audit
